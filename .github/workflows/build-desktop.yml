name: Build Desktop Versions

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # 手动触发按钮

jobs:
  build_desktop:
    name: Build Desktop on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest] # 仅构建 Windows

    steps:
      - uses: actions/checkout@v5 # 升级到支持 Node24 的版本
      - name: Setup Node.js
        uses: actions/setup-node@v5 # 升级到支持 Node24 的版本
        with:
          node-version: 20
          cache: 'npm'

      # 安装根目录依赖
      - name: Install root dependencies
        run: npm ci

      # 构建 UI 部分
      - name: Build UI
        run: |
          cd UI
          npm ci
          npm run build

      # 打包 Windows 桌面应用
      - name: Build and Release
        uses: samuelmeuli/action-electron-builder@v1.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: false # 暂时关闭自动发布（避免创建 GitHub Release）
          args: --win portable # 强制打包 Windows 便携版 exe
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }} # 保留必要环境变量

      # 核心新增：上传 Windows 产物到 Artifacts
      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TallyArbiter-Windows-Portable
          # 匹配 electron-builder 生成的 Windows 产物路径（覆盖常见格式）
          path: |
            dist/*.exe
            dist/*.zip
            dist/win-unpacked/
          retention-days: 30 # 产物保留 30 天
